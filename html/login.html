<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BlogDev</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/style.css">
    
</head>
<body>

    <div class="login-card">
        <a class="brand-logo">BlogDev</a>
        <p class="text-center text-muted mb-4">Bem-vindo de volta!</p>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="Digite seu email" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-dark w-100 mb-3">
                Entrar na Conta
            </button>
            
            <div class="text-center">
                <span class="small text-muted">Ainda não tem conta?</span>
                <a href="cadastro.html" class="small fw-bold text-dark text-decoration-none">Criar agora</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/services/ui/loginUI.js"></script>
</body>
</html>
