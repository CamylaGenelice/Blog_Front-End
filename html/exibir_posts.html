<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todos os Posts - BlogDev</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .post-card {
            transition: transform 0.2s;
            border: none;
            border-bottom: 1px solid #dee2e6;
        }
        .post-card:hover {
            background-color: #f8f9fa;
        }
        .category-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hero-section {
            padding: 100px 0;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">BlogDev</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="home.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="exibir_posts.html">Artigos</a>
                    </li>
                    <li id="criarPost" data-role-admin="true" class="nav-item">
                        <a class="nav-link" href="create_posts.html">Criar posts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contato</a>
                    </li>
                </ul>
                
                <form id="formBarraPesquisa" class="d-flex" role="search">
                    <input id="tituloPost" class="form-control me-2" type="search" placeholder="Pesquisar no blog..." aria-label="Search">
                    <button class="btn btn-outline-light" type="submit">Buscar</button>
                    <button class="ms-2 btn btn-outline-light" type="submit"><a class="nav-link" href="cadastro.html">Cadastro</a></button>
                    <button class="ms-2 btn btn-outline-light" type="submit"><a class="nav-link" href="login.html">Login</a></button>
                </form>
            </div>
        </div>
    </nav>

    <header class="py-2 bg-white shadow-sm mb-5">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-7 ">
                    <h1 class="fw-bold">Arquivo do Blog</h1>
                    <p class="text-muted">Explorar todos os artigos, tutoriais e insights publicados.</p>
                </div>
                
            </div>
        </div>
    </header>

    <main class="container mb-5">
        <div id="posts-container-wrapper">
            <div class="row justify-content-center">
                <div class="col-lg-9" id="posts-container">
                </div>
            </div>
        </div>
        
        <div id="post-detalhado" class="d-none">
            <button class="btn btn-secondary mb-4" onclick="voltarParaLista()">
                <i class="bi bi-arrow-left">
                    Voltar
                </i>
            </button>
            <div id="conteudo-do-post"></div>
            
            <hr class="my-5">
            <section id="secao-comentarios" class="mt-5">
                <h4>Comentários</h4>
                <div id="formulario-comentario-container" class="mb-4"></div>
                <div id="lista-comentarios"></div>
                <div id="mensagem"></div>
            </section>
        </div>

       
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 BlogDev - Compartilhando conhecimento técnico.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../services/ui/post_commentUI.js"></script>
    <script type="module" src="../services/ui/createPostUI.js"></script>
</body>
</html>
