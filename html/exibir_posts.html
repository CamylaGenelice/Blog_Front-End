<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todos os Posts - BlogDev</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .post-card {
            transition: transform 0.2s;
            border: none;
            border-bottom: 1px solid #dee2e6;
        }
        .post-card:hover {
            background-color: #f8f9fa;
        }
        .category-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="home.html">BlogDev</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Todos os Posts</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Sobre</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="py-5 bg-white shadow-sm mb-5">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h1 class="fw-bold">Arquivo do Blog</h1>
                    <p class="text-muted">Explorar todos os artigos, tutoriais e insights publicados.</p>
                </div>
                <div class="col-md-6">
                    <form class="input-group" id="formBarraPesquisa">
                        <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" id="tituloPost" class="form-control border-start-0" placeholder="Pesquisar...">
                        <input class="input-group-text bg-transparent border-end-0" type="submit" value="enviar">
                    </form>
                </div>
            </div>
        </div>
    </header>

    <main class="container mb-5">
        <div id="posts-container-wrapper">
            <div class="row justify-content-center">
                <div class="col-lg-9" id="posts-container">
                </div>
            </div>
        </div>
        
        <div id="post-detalhado" class="d-none">
            <button class="btn btn-secondary mb-4" onclick="voltarParaLista()">
                <i class="bi bi-arrow-left">
                    Voltar
                </i>
            </button>
            <div id="conteudo-do-post"></div>
        </div>

        <hr class="my-5">
        <section id="secao-comentarios" class="mt-5">
            <h4>Comentários</h4>
            <div id="formulario-comentario-container" class="mb-4"></div>
            <div id="lista-comentarios"></div>
            <div id="mensagem"></div>
        </section>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 BlogDev - Compartilhando conhecimento técnico.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/services/ui/postUI.js"></script>
</body>
</html>
